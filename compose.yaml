name: la-quinta

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-menudb}
      POSTGRES_USER: ${POSTGRES_USER:-la_quinta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD}
      TZ: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
      PGTZ: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-la_quinta} -d ${POSTGRES_DB:-menudb}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./API_LA_QUINTA
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-la_quinta}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-menudb}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET:?Defini JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_CONNECTION_TIMEOUT_MS: ${DB_CONNECTION_TIMEOUT_MS:-5000}
      APP_TIMEZONE: ${APP_TIMEZONE:-America/Argentina/Buenos_Aires}
      TRUST_PROXY_HOPS: 1
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:5175,http://127.0.0.1:3000,http://127.0.0.1:5173,http://127.0.0.1:5174,http://127.0.0.1:5175,https://laquintacomidas.com,https://dev.laquintacomidas.com,https://devadmin.laquintacomidas.com}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - api_uploads:/app/uploads
    ports:
      - "3000:3000"

  admin:
    build:
      context: ./front_menu
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5174:8080"

  clientes:
    build:
      context: ./front_clientes
    restart: unless-stopped
    environment:
      API_UPSTREAM: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5175:8080"

  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    restart: unless-stopped
    profiles:
      - tunnel
    command: ["tunnel", "--config", "/etc/cloudflared/config.yml", "run"]
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials.json:/etc/cloudflared/credentials.json:ro
    depends_on:
      admin:
        condition: service_healthy
      clientes:
        condition: service_healthy

volumes:
  postgres_data:
  api_uploads:
