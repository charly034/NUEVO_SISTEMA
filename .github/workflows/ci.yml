name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: API_LA_QUINTA
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: API_LA_QUINTA/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_menu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_menu/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  clientes:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front_clientes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: front_clientes/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        context: [API_LA_QUINTA, front_menu, front_clientes]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: false
