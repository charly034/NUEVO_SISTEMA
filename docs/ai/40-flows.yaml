schema: la_quinta_flows_v2
updated_at: "2026-07-02"

flows:
  local_start:
    status: verified_in_repo
    sequence:
      - "API: cd API_LA_QUINTA && npm run dev"
      - "Admin: cd front_menu && npm run dev"
      - "Clientes: cd front_clientes && npm run dev"
      - "Alternativa Windows: .\\iniciar.bat abre una sola ventana de Windows Terminal llamada La Quinta Servicios con pestanas visibles para API, Clientes, Admin y cloudflared; frontends usan Vite con --force."
      - "Al reejecutar .\\iniciar.bat, iniciar-servicios.ps1 limpia procesos previos del proyecto sin cerrar la terminal desde donde se lanza."
      - "front_menu y front_clientes sirven dev con Cache-Control no-store/no-cache para evitar modulos React viejos al pasar por Cloudflare Tunnel o navegador integrado."
      - "front_menu y front_clientes agregan en dev un query de sesion a imports relativos de src para romper cache de modulos entre reinicios de Vite."
    manual_smoke_checks:
      - "GET http://127.0.0.1:3000/api/v1/health"
      - "Abrir http://127.0.0.1:5174 y verificar pantalla/login admin"
      - "Abrir http://127.0.0.1:5175 y verificar pantalla login cliente"
      - "Abrir https://devadmin.laquintacomidas.com y https://dev.laquintacomidas.com si cloudflared esta activo"

  docker_start:
    status: verified_in_local_runtime
    sequence:
      - "Abrir Docker Desktop y verificar que el motor desktop-linux este corriendo."
      - "Si docker no esta en PATH, anteponer C:\\Program Files\\Docker\\Docker\\resources\\bin en la terminal actual."
      - "Copiar .env.docker.example a .env"
      - "Completar POSTGRES_PASSWORD y JWT_SECRET sin commitear secretos; ajustar CORS_ORIGINS si se necesitan origenes distintos al default."
      - "Validar configuracion: docker compose config"
      - "Construir imagenes: docker compose build"
      - "docker compose up --build -d"
      - "Opcional Cloudflare Tunnel en Docker: completar CLOUDFLARED_TUNNEL_TOKEN en .env y ejecutar docker compose --profile tunnel up --build -d."
      - "Para el tunnel Docker, configurar en Cloudflare Zero Trust los public hostnames: dev.laquintacomidas.com -> http://clientes:8080 y devadmin.laquintacomidas.com -> http://admin:8080."
      - "API depende de db healthy"
      - "admin/clientes dependen de api healthy"
      - "cloudflared depende de admin/clientes healthy cuando se activa profile tunnel."
      - "Cerrar smoke local con docker compose down si no se necesita dejar la pila levantada"
    manual_smoke_checks:
      - "docker compose ps"
      - "GET http://localhost:3000/api/v1/health"
      - "http://localhost:5174"
      - "http://localhost:5175"
      - "Si profile tunnel esta activo: https://dev.laquintacomidas.com y https://devadmin.laquintacomidas.com"
      - "Logs de api/admin/clientes/db sin errores de arranque"

  cliente_auth:
    status: verified_in_repo
    files:
      - "front_clientes/src/services/api.js"
      - "front_clientes/src/hooks/useAuth.js"
      - "API_LA_QUINTA/src/modules/auth"
    sequence:
      - "POST /api/v1/auth/login con email, password, remember"
      - "POST /api/v1/auth/registro exige codigo, nombre, apellido, email, telefono, fecha_nacimiento y password."
      - "API valida empleado activo y empresa activa"
      - "API firma JWT con sub, empresa_id, nombre, apellido, rol"
      - "API devuelve empleado de sesion con telefono, fecha_nacimiento y preferencias_alimentarias para Mi cuenta."
      - "front_clientes guarda token/empleado en localStorage si remember=true, si no en sessionStorage"
      - "requests agregan Authorization Bearer"
      - "ante 401 se limpia sesion y se emite cliente:unauthorized"
      - "Onboarding usa tres pantallas introductorias: elegir viandas de la semana, confirmar antes del cierre dinamico por empresa/semana y revisar/modificar el pedido mientras haya dias habilitados; no debe prometer un dia/hora fijo de cierre."
    error_behavior:
      - "credenciales invalidas -> 401 con success=false"
      - "empresa inactiva o usuario inactivo -> 401"
    manual_smoke_checks:
      - "Login valido redirige a /pedido-semanal"
      - "Login invalido muestra error visible"
      - "Refresh mantiene sesion si storage contiene token valido"

  admin_auth:
    status: verified_in_repo
    files:
      - "front_menu/src/auth.js"
      - "front_menu/src/lib/apiClient.js"
      - "API_LA_QUINTA/src/modules/admin-auth"
      - "API_LA_QUINTA/src/modules/usuarios-admin"
    sequence:
      - "POST /api/v1/admin/auth/login"
      - "API valida usuario_admin activo y firma JWT con tipo=admin"
      - "front_menu guarda admin_token/admin_user"
      - "App llama /admin/auth/me si hay token sin usuario guardado"
      - "ante 401 apiClient limpia storage y emite admin:unauthorized"
    manual_smoke_checks:
      - "Admin valido entra al dashboard"
      - "Admin sin token ve AdminLogin"
      - "Superadmin puede abrir /administradores"

  admin_empresas_empleados:
    status: verified_in_repo
    files:
      - "front_menu/src/App.jsx"
      - "front_menu/src/pages/Empresas.jsx"
      - "front_menu/src/hooks/useEmpresas.js"
      - "front_menu/src/hooks/useEmpleados.js"
    sequence:
      - "Admin abre /empresas para gestionar empresas."
      - "La gestion de empleados vive como panel dentro de Empresas.jsx segun empresa activa."
      - "ModalEmpleado permite crear/editar empleado con telefono y fecha_nacimiento; API devuelve ambos campos en listado/detalle."
      - "La ruta /empleados renderiza Empresas.jsx para evitar pantalla en blanco y llevar al panel que contiene empleados."
    manual_smoke_checks:
      - "Abrir /empresas y verificar lista de empresas y panel de empleados."
      - "Crear o editar empleado con telefono y fecha de nacimiento; verificar que se muestran en la fila del empleado."
      - "Abrir /empleados y verificar que no queda pantalla vacia."

  cliente_pedido_semanal:
    status: verified_in_repo
    source_docs:
      - "docs/pedidos-cliente.md"
    files:
      - "front_clientes/src/hooks/usePedidoSemanal.js"
      - "front_clientes/src/services/pedidoService.js"
      - "front_clientes/src/services/menuService.js"
      - "front_clientes/src/mappers/pedidoMapper.js"
      - "front_clientes/src/components/pedido"
      - "API_LA_QUINTA/src/modules/pedidos"
      - "API_LA_QUINTA/src/modules/menu"
    sequence:
      - "usePedidoSemanal llama obtenerSemanasPedido"
      - "GET /api/v1/pedidos/semanas devuelve semanas para empleado/empresa del token"
      - "Al editar, menuService consulta GET /api/v1/menu/semanas/:semanaId/opciones"
      - "El usuario selecciona plato por dia y guarnicion si aplica"
      - "crear pedido: POST /api/v1/pedidos"
      - "si se creo y vuelve id, usePedidoSemanal confirma con PATCH /api/v1/pedidos/:id/confirmar"
      - "modificar pedido: PUT /api/v1/pedidos/:id"
      - "Inicio usa tabs fijas Inicio / Historial / Perfil; Inicio siempre vuelve al home de pedido y muestra badge ambar si la semana actual tiene menu publicado y pedido pendiente."
      - "Semana actual con menu publicado muestra dos acciones: Hacer pedido abre WeeklyOrderView y Ver menu abre MenuViewScreen."
      - "Otras semanas con menu publicado abren primero MenuViewScreen; desde ahi Hacer mi pedido abre WeeklyOrderView solo si quedan dias editables."
      - "Semanas sin menu abren SuggestionSheet desde Inicio y guardan con POST /api/v1/pedidos/sugerencias sin navegar al stack."
      - "Semanas cerradas abren WeeklyOrderView en modo solo lectura."
      - "front_clientes/src/pages/SugerenciasPage.jsx tambien usa POST /api/v1/pedidos/sugerencias para no desalinear admin ni pedido_sugerencias"
      - "si la semana sin menu ya tiene recomendacionesUsuario o comentarioRecomendacion, SemanaCardLectura muestra agradecimiento y no muestra CTA de sugerir"
      - "backend registra eventos y devuelve pedido normalizado"
    hard_rules:
      - "Frontend no debe enviar usuarioId ni empresaId como autoridad para guardar."
      - "Backend usa req.empleado.sub y req.empleado.empresa_id."
      - "Backend valida dias laborales, plazo, plato, opcion y guarnicion."
      - "Si el menu marca un dia sin servicio/feriado, el cliente lo ve como sin vianda por defecto y no puede editarlo desde la pantalla semanal."
      - "POST/PUT de pedidos rechaza items enviados para dias sin servicio/feriado."
      - "El plazo de POST/PUT lo define la empresa; menus_semanales.fecha_limite_pedidos no bloquea el pedido cliente."
      - "Para empresas diarias o mixtas, cada dia bloqueado por limiteEmpresa.diasCerrados queda fuera de edicion; si todos los dias laborales estan bloqueados, la semana queda cerrada."
      - "Frontend centraliza permisos de pedido en front_clientes/src/utils/permisosPedido.js y no debe mostrar CTA de pedido cuando no hay dias editables ni pedido existente."
      - "Si sin_pedido=true no se permite plato_id ni guarnicion_id."
      - "Transaccion debe hacer rollback ante error."
      - "La pantalla de sugerencias no debe reutilizar guardar pedido ni exigir dias seleccionados."
    ui_decisions_2026_06_28:
      - "Se reemplaza el carrusel/listado de semanas por un panel de accion que muestra siempre la semana en curso."
      - "La semana actual usa accion contextual: Ver pedido si ya existe pedido, Ver menu si hay menu publicado o Ver semana si aun no hay menu."
      - "La pantalla principal usa cards grandes por accion: semana actual, semanas proximas con menu publicado y sugerir menu cuando no hay menu."
      - "Las semanas con menu publicado abren primero en lectura para mostrar fecha, dias y todas las opciones especiales de la semana antes de entrar a cargar pedido."
      - "Desde el panel principal, las semanas con menu publicado sin pedido cargado usan CTA Ver menu; la carga de pedido se ofrece recien dentro de la lectura si hay dias editables."
      - "Si una semana publicada no tiene dias editables, la UI no debe mostrar Confirmar pedido."
      - "Las semanas futuras montan SemanaPedidoCard recien cuando el usuario toca la accion correspondiente; en ese modo se oculta el resto y la card ocupa el alto disponible."
      - "La semana activa se persiste por semana.id en localStorage y la tab Pedido vuelve a la pantalla principal."
      - "El estado de pedido muestra X de Y dias o Faltan N dias durante edicion."
      - "Semanas de sugerencias se etiquetan como Sin menu / Sugerencias abiertas y, al abrirse, explican que el usuario esta dejando ideas para esa semana y no cargando un pedido."
      - "El bottom sheet de seleccion aclara que elegir un plato no guarda el pedido; el guardado ocurre al tocar Confirmar pedido o Guardar cambios."
      - "El bottom sheet de seleccion usa encabezado compacto con solo el dia, permite navegar al dia anterior o siguiente cuando aplica e indica visualmente si hay mas opciones hacia abajo."
      - "El bottom sheet de seleccion debe quedar por encima de BottomNavigation; en viewport 480x608 el boton Listo para el dia debe ser visible y clickeable."
      - "El footer de accion/confirmacion de WeeklyOrderView debe quedar fijo por encima de BottomNavigation; los estados Confirmar pedido y Pedido confirmado + Volver al inicio deben verse completos."
    ui_decisions_2026_07_02_figma_make:
      - "BottomNavigation renombra tabs a Inicio, Historial y Perfil con iconos Home, History y User."
      - "Inicio emite evento pedido:estado-inicio para que BottomNavigation muestre badge ambar cuando hay pedido pendiente y el tab no esta activo."
      - "Inicio visualmente sigue el mockup Figma: header verde con saludo, aviso compacto Primera semana, seccion Semana actual con card blanca y seccion Proximas semanas con cards separadas."
      - "En Proximas semanas, las semanas con menu publicado usan card amplia similar a Semana actual; si falta pedido muestran un mensaje de invitacion a hacerlo y CTA Hacer pedido."
      - "Sugerencias deja de ser navegacion primaria para semanas sin menu; el flujo activo usa SuggestionSheet."
      - "MenuViewScreen agrega selector superior de dias y lista platos por dia con foto, categoria, calorias, alergenos y aviso de guarnicion cuando los datos existen."
      - "MenuViewScreen oculta Hacer mi pedido cuando no hay dias editables y no existe pedido cargado; solo permite consultar el menu y muestra el motivo."
      - "NavMapScreen vive en /mapa-navegacion como referencia interna de navegacion cliente; el repo no tiene sidebar desktop cliente donde enlazarlo visualmente."
    error_behavior:
      - "401 carga pedido -> mensaje de iniciar sesion nuevamente"
      - "otros errores carga -> mensaje generico de intentar nuevamente"
      - "error guardado -> errorGuardar.message o mensaje generico"
    manual_smoke_checks:
      - "Iniciar sesion como empleado"
      - "Abrir /pedido-semanal"
      - "Ver semanas reales"
      - "Abrir semana actual/proxima editable"
      - "Elegir plato sin guarnicion y guardar"
      - "Elegir plato con guarnicion y verificar bloqueo si falta guarnicion"
      - "Confirmar pedido, recargar pagina y verificar persistencia"
      - "Modificar pedido existente y verificar pedido_eventos"
      - "Probar dia sin servicio y semana fuera de plazo"
      - "Enviar sugerencia en semana sin menu y verificar que no aparezca validacion de dias de pedido"
      - "Volver a la semana sin menu con sugerencia enviada y verificar que solo aparezca el agradecimiento"

  admin_menu_semanal:
    status: verified_in_repo
    files:
      - "front_menu/src/pages/Semanas.jsx"
      - "front_menu/src/pages/SemanaDetalle.jsx"
      - "front_menu/src/hooks/useMenus.js"
      - "API_LA_QUINTA/src/modules/menus-semanales"
    sequence:
      - "Admin crea menu semanal"
      - "Admin agrega platos por dia/opcion"
      - "Admin puede marcar dia sin servicio"
      - "Admin cambia estado del menu"
      - "Al reabrir un menu desde front_menu, se publica con fecha_limite_pedidos=null para no arrastrar un limite vencido."
      - "Al pasar un menu a publicado, API crea notificaciones tipo menu para empleados activos y usa dedupe_key para no duplicar por menu/empleado."
      - "Cliente consume menu publicado desde pedidos/menu"
    manual_smoke_checks:
      - "Crear semana con fecha_inicio/fecha_fin validas"
      - "Agregar opcion A para lunes"
      - "Marcar un dia sin servicio"
      - "Publicar/cambiar estado si UI lo permite"
      - "Verificar que cliente vea opciones o sin servicio"

  admin_platos_metadata:
    status: verified_in_repo
    files:
      - "front_menu/src/pages/Platos.jsx"
      - "front_menu/src/components/platos/PlatoForm.jsx"
      - "front_menu/src/services/platos.service.js"
      - "API_LA_QUINTA/src/modules/platos"
      - "API_LA_QUINTA/src/middlewares/upload-plato-image.middleware.js"
      - "API_LA_QUINTA/scripts/backfill-platos-metadata-aproximada.js"
    sequence:
      - "Admin abre Platos y crea/edita un plato."
      - "PlatoForm permite nombre, descripcion, descripcion_larga/receta, kcal aproximadas, alergenos, vegetariano, tags, tipo, guarnicion e imagen."
      - "Si se selecciona foto JPG/PNG/WebP <=5MB, front_menu envia multipart/form-data con field foto."
      - "API valida formato/tamano, convierte a WebP comprimido max 1200x900 y guarda en uploads/platos."
      - "API persiste foto_url y metadata en platos; /uploads/platos sirve el archivo."
      - "front_menu y front_clientes proxyean /uploads a API para mostrar imagenes en dev y Docker/Nginx."
      - "GET /api/v1/pedidos/semanas y GET /api/v1/menu/semanas/:semanaId/opciones exponen metadata del plato para MenuViewScreen cliente."
    manual_smoke_checks:
      - "Crear plato con imagen PNG/JPG y verificar que queda foto_url /uploads/platos/*.webp."
      - "Editar plato con nueva imagen y verificar reemplazo visual en listado admin."
      - "Abrir cliente MenuViewScreen y verificar foto/kcal/alergenos si el plato esta en menu."

  admin_pedidos:
    status: verified_in_repo
    files:
      - "front_menu/src/pages/PedidosAdmin.jsx"
      - "front_menu/src/pages/PedidosHoy.jsx"
      - "front_menu/src/hooks/usePedidos.js"
      - "API_LA_QUINTA/src/modules/pedidos"
    sequence:
      - "Admin lista pedidos con GET /api/v1/pedidos"
      - "Admin puede ver detalle GET /api/v1/pedidos/:id"
      - "Admin cambia estado PATCH /api/v1/pedidos/:id/estado"
      - "Backend registra pedido_eventos tipo estado_cambiado"
      - "Backend crea una notificacion para el empleado del pedido con dedupe_key pedido-estado:<pedido_id>:<estado>."
    manual_smoke_checks:
      - "Crear pedido desde cliente"
      - "Verlo en panel admin"
      - "Cambiar estado a en_proceso/listo"
      - "Verificar que el cambio persiste"
      - "Verificar que el cliente ve una notificacion nueva y aumenta el contador no leidas."

  admin_notificaciones:
    status: verified_in_repo
    files:
      - "front_menu/src/pages/NotificacionesAdmin.jsx"
      - "front_menu/src/hooks/useNotificaciones.js"
      - "API_LA_QUINTA/src/modules/notificaciones"
    sequence:
      - "Admin abre /notificaciones desde sidebar o menu Mas mobile."
      - "Panel Internas permite envio manual a todos, empresa o empleado con POST /api/v1/notificaciones/admin."
      - "Panel Internas administra reglas de eventos con GET/POST/PATCH/DELETE /api/v1/notificaciones/admin/reglas?canal=interna."
      - "Panel WhatsApp administra activo/webhook_url de n8n con GET/PATCH /api/v1/notificaciones/admin/whatsapp/config."
      - "Panel WhatsApp administra destinatarios externos con /api/v1/notificaciones/admin/whatsapp/destinatarios."
      - "Panel WhatsApp administra reglas canal=whatsapp con filtros por alcance, empresa, empleado, rol, plan, modo_pedido, dias_laborales, preferencia WhatsApp y contactos externos."
      - "Para evento pedido_semanal_pendiente, el formulario muestra programacion semanal con dia_semana y hora; el scheduler de API corre cada minuto y ejecuta la regla si coincide."
      - "pedido_semanal_pendiente usa la semana publicada objetivo mas cercana con fecha_fin >= CURRENT_DATE y envia solo a empleados activos sin pedido no-cancelado para esa semana."
      - "Panel WhatsApp muestra auditoria de llamadas al webhook con GET /api/v1/notificaciones/admin/whatsapp/envios y permite prueba manual con POST /api/v1/notificaciones/admin/whatsapp/probar; si n8n rechaza la llamada, la API responde 502 con status_code/respuesta/error y el panel lo muestra como error."
      - "GET /api/v1/notificaciones/admin lista ultimas notificaciones internas con empleado y empresa."
      - "El cliente las consume con GET /api/v1/notificaciones y el badge de Inicio usa GET /api/v1/notificaciones/no-leidas/count."
      - "Eventos automaticos disponibles: nuevo_registro, menu_publicado y pedido_estado_cambiado; cada evento consulta reglas activas por canal."
      - "Evento programado disponible: pedido_semanal_pendiente; ejemplo operativo: lunes 09:00 a todos los empleados con telefono que aun no hicieron el pedido semanal."
    manual_smoke_checks:
      - "Enviar notificacion a un empleado y verificar que aparece en la lista admin."
      - "Crear/editar/pausar una regla interna para menu_publicado y verificar que queda listada en el panel Internas."
      - "Guardar webhook n8n inactivo/activo y verificar validacion de URL http/https."
      - "Crear destinatario externo de WhatsApp y usarlo en una regla canal=whatsapp."
      - "Crear una regla WhatsApp evento pedido_semanal_pendiente, dia Lunes y hora 09:00; verificar que queda listada con su programacion."
      - "Ejecutar prueba de webhook y verificar que aparece en Ultimos envios WhatsApp con estado enviado o fallido."
      - "Iniciar sesion como ese empleado, abrir Inicio y verificar contador."
      - "Abrir /notificaciones cliente, marcar leida y verificar que baja el contador."

  cliente_historial_perfil:
    status: verified_in_repo
    files:
      - "front_clientes/src/pages/HistorialPage.jsx"
      - "front_clientes/src/pages/PerfilPage.jsx"
      - "front_clientes/src/services/api.js"
    sequence:
      - "Historial usa endpoints cliente autenticados"
      - "Cancelar pedido en Historial llama DELETE /api/v1/pedidos/mi-pedido?semana_inicio=YYYY-MM-DD, actualiza cache mi-historial como cancelado, limpia el pedido activo en caches pedido-semanal e invalida ambas queries."
      - "Perfil usa authApi.actualizarPerfil y authApi.cambiarPassword"
      - "PerfilPage muestra Empresa, Plan, Telefono y Cumpleanos desde el empleado autenticado."
      - "PerfilPage usa PATCH /api/v1/auth/preferencias para preferencias alimentarias"
      - "PerfilPage usa el mismo PATCH /api/v1/auth/preferencias para recibir_recordatorios_whatsapp; controla futuros avisos por WhatsApp/telefono y no desactiva la campana interna."
      - "NotificacionesPage usa GET/PATCH /api/v1/notificaciones"
      - "Inicio consulta GET /api/v1/notificaciones/no-leidas/count para mostrar el badge real de no leidas; no debe hardcodear contadores."
    manual_smoke_checks:
      - "Abrir /mis-pedidos con sesion cliente"
      - "Abrir /mi-cuenta y verificar Empresa, Plan, Telefono y Cumpleanos."
      - "Cambiar password con validacion visible"
      - "Abrir /notificaciones y verificar loading/empty/listado sin sesion cruzada"

  seed_menus_historicos:
    status: verified_in_repo
    files:
      - "API_LA_QUINTA/scripts/menu-normalizacion.js"
      - "API_LA_QUINTA/scripts/import-menus-csv.js"
      - "API_LA_QUINTA/scripts/seed-menus-completo.js"
      - "API_LA_QUINTA/scripts/seed-platos-fijos.js"
      - "API_LA_QUINTA/scripts/seed-platos-completo.js"
      - "API_LA_QUINTA/scripts/seed-full-reset.js"
      - "API_LA_QUINTA/scripts/backfill-platos-metadata-aproximada.js"
      - "API_LA_QUINTA/scripts/backfill-demo-perfiles.js"
      - "API_LA_QUINTA/scripts/menus-historicos.csv"
      - "API_LA_QUINTA/src/database/seeds/menus-historicos.csv"
    sequence:
      - "El CSV historico fuente contiene 23 columnas de semanas entre 2026-01-26 y 2026-07-06."
      - "Los seeds usan FECHAS_INICIO_MENUS_HISTORICOS para corregir encabezados humanos con fechas erroneas o incompletas."
      - "canonicalizarNombrePlato limpia prefijos A/C, corrige typos frecuentes y agrupa alias equivalentes antes de crear o buscar platos."
      - "import-menus-csv.js carga estado por fecha: semanas pasadas cerrado, semana actual publicado y futuras borrador."
      - "import-menus-csv.js mantiene menus_semanales, menu_semanal_dias, menu_semanal_sin_servicio e historial_uso_platos alineados con el CSV."
      - "seed-platos-fijos.js, seed-platos-completo.js, import-menus-csv.js y seed-full-reset.js recalculan metadata aproximada de platos luego de crear/actualizar catalogo."
      - "backfill-platos-metadata-aproximada.js exporta actualizarMetadataPlatos y metadataParaPlato; carga descripciones, receta/preparacion breve, kcal aproximadas, alergenos y vegetariano para platos existentes; no inventa foto_url."
      - "npm run seed es el comando consolidado para catalogo + menus; ejecuta seed:catalogo y luego seed:menus."
      - "npm run seed:catalogo ejecuta seed-guarniciones-completo.js y seed-platos-completo.js; deja guarniciones, platos y metadata aproximada."
      - "npm run seed:menus ejecuta import-menus-csv.js; recrea menus desde CSV e historial asociado."
      - "seed-full-reset.js se expone como npm run seed:demo-reset; es destructivo, bloquea NODE_ENV=production y exige SEED_FULL_RESET_CONFIRM=RESET_DEV_DATABASE."
