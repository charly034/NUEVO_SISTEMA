schema: la_quinta_ai_admin_guide_v2
updated_at: "2026-07-06"

maintenance_guide:
  status: verified_in_repo
  principle: "Leer AGENTS.md y docs/ai antes de tocar codigo. Mantener cambios pequenos y verificables."
  do_first:
    - "git status --short --branch"
    - "leer docs/ai/00-index.yaml"
    - "leer docs/ai/10-system-map.yaml"
    - "leer docs/ai/30-contracts.yaml"
  do_after_code_changes:
    - "actualizar docs/ai si cambio contrato, flujo, modulo, ruta, migracion, script o env"
    - "ejecutar validacion del area modificada"

start_here_by_task:
  api_endpoint:
    read:
      - "API_LA_QUINTA/src/routes/v1.routes.js"
      - "API_LA_QUINTA/src/modules/<modulo>/<modulo>.routes.js"
      - "API_LA_QUINTA/src/modules/<modulo>/<modulo>.controller.js"
      - "API_LA_QUINTA/src/modules/<modulo>/<modulo>.service.js"
      - "API_LA_QUINTA/src/modules/<modulo>/<modulo>.repository.js"
    docs:
      - "docs/ai/20-modules.yaml"
      - "docs/ai/30-contracts.yaml"
      - "docs/ai/50-guardrails.yaml"
  pedido_cliente:
    read:
      - "docs/pedidos-cliente.md"
      - "front_clientes/src/hooks/usePedidoSemanal.js"
      - "front_clientes/src/services/pedidoService.js"
      - "front_clientes/src/services/menuService.js"
      - "front_clientes/src/mappers/pedidoMapper.js"
      - "API_LA_QUINTA/src/modules/pedidos"
    docs:
      - "docs/ai/30-contracts.yaml"
      - "docs/ai/40-flows.yaml"
      - "docs/ai/60-debt.yaml"
  admin_ui:
    read:
      - "docs/ai/ux-admin-prompt.md"
      - "front_menu/src/App.jsx"
      - "front_menu/src/auth.js"
      - "front_menu/src/lib/apiClient.js"
      - "front_menu/src/hooks"
      - "front_menu/src/pages"
    docs:
      - "docs/ai/ux-admin-prompt.md"
      - "docs/ai/05-admin.yaml"
      - "docs/ai/20-modules.yaml"

ux_admin_normalization:
  status: partially_applied
  source: "docs/ai/ux-admin-prompt.md"
  scope: "front_menu"
  principle: "Simplicidad Radical: el objetivo primario de cada vista debe estar visible y alcanzable en 1-2 clicks, sin scroll inicial."
  last_application_2026_07_06:
    code_paths:
      - "front_menu/src/pages/Platos.jsx"
      - "front_menu/src/pages/Guarniciones.jsx"
      - "front_menu/src/pages/NotificacionesAdmin.jsx"
      - "front_menu/src/pages/Administradores.jsx"
      - "front_menu/src/pages/PedidosPagos.jsx"
      - "front_menu/src/pages/SemanaDetalle.jsx"
      - "front_menu/src/pages/PedidosAdmin.jsx"
      - "front_menu/src/pages/PedidosHoy.jsx"
      - "front_menu/src/pages/PedidosPanel.jsx"
    summary:
      - "Acciones destructivas removidas de tablas/listados y ubicadas en drawer/modal de detalle."
      - "Filtros secundarios movidos a secciones Filtros avanzados colapsables donde habia sobrecarga."
      - "Tabla de PedidosPagos reducida a columnas principales y acciones movidas al detalle."
      - "SemanaDetalle deja de exponer la X directa para quitar platos y usa detalle con confirmacion."
      - "Pedidos agrupa Seguimiento, Produccion semanal, Produccion diaria y Despacho hoy en /pedidos, con entregas por vianda diaria y /pedidos-hoy como redireccion de compatibilidad."
    validation:
      - "cd front_menu && npm run lint: OK sin errores, con 2 warnings react-hooks en Semanas.jsx."
      - "cd front_menu && npm run build: OK."
      - "cd API_LA_QUINTA && npm run lint: OK."
      - "cd API_LA_QUINTA && npm test: OK."
      - "cd API_LA_QUINTA && npm run migrate: OK para 1719000048000_pedido-items-estado."
      - "Smoke navegador integrado /pedidos: Seguimiento, Produccion semanal, Produccion diaria, Despacho hoy y /pedidos-hoy OK sin errores de consola ni overflow horizontal."
  default_view_structure:
    - "Header con titulo, descripcion breve y accion primaria."
    - "Filtros: maximo 3 visibles; el resto en Filtros avanzados colapsable."
    - "Lista o tabla con columnas clave y detalle progresivo en SideDrawer."
    - "SideDrawer para formularios/detalles; modales solo para confirmaciones simples o 1-2 campos."
  must_check_before_admin_ui_finish:
    - "KPI principal visible en los primeros 100px cuando exista un resumen operativo."
    - "Tablas con maximo 5-6 columnas visibles."
    - "Filas clickeables con hover/cursor o una unica accion de ver detalle."
    - "Acciones destructivas fuera de la tabla, al final del drawer/modal y con confirm()."
    - "Filtros con label visible, tags de filtro activo y preservacion al cambiar tabs."
    - "Mobile sin scroll horizontal; filtros colapsables bajo Filtrar cuando corresponda."
  cliente_ui:
    read:
      - "front_clientes/src/App.jsx"
      - "front_clientes/src/routes/rutasCliente.js"
      - "front_clientes/src/components/layout"
      - "front_clientes/src/components/ui/BottomNavigation.jsx"
      - "front_clientes/src/components/pedido"
    docs:
      - "docs/ai/40-flows.yaml"
      - "docs/ai/50-guardrails.yaml"
  database:
    read:
      - "API_LA_QUINTA/src/database/migrations"
      - "API_LA_QUINTA/src/database/connection.js"
      - "API_LA_QUINTA/database.json"
    docs:
      - "docs/ai/30-contracts.yaml"
      - "docs/ai/50-guardrails.yaml"

symptom_routing:
  verified_in_repo:
    "401 cliente":
      inspect:
        - "front_clientes/src/services/api.js"
        - "front_clientes/src/services/apiCliente.js"
        - "API_LA_QUINTA/src/middlewares/auth.middleware.js"
        - "API_LA_QUINTA/src/modules/auth"
    "401 admin":
      inspect:
        - "front_menu/src/auth.js"
        - "front_menu/src/lib/apiClient.js"
        - "API_LA_QUINTA/src/modules/admin-auth"
        - "API_LA_QUINTA/src/modules/usuarios-admin"
    "pedido no guarda":
      inspect:
        - "front_clientes/src/hooks/usePedidoSemanal.js"
        - "front_clientes/src/mappers/pedidoMapper.js"
        - "API_LA_QUINTA/src/modules/pedidos/pedidos.validation.js"
        - "API_LA_QUINTA/src/modules/pedidos/pedidos.service.js"
    "menu u opciones no aparecen":
      inspect:
        - "front_clientes/src/services/menuService.js"
        - "API_LA_QUINTA/src/modules/menu/menu.routes.js"
        - "API_LA_QUINTA/src/modules/pedidos/pedidos.service.js"
        - "API_LA_QUINTA/src/modules/menus-semanales"
    "admin no ve datos":
      inspect:
        - "front_menu/src/lib/apiClient.js"
        - "front_menu/src/hooks"
        - "API_LA_QUINTA/src/middlewares/auth.middleware.js"
    "deploy/proxy":
      inspect:
        - "compose.yaml"
        - "front_menu/nginx/default.conf.template"
        - "front_clientes/nginx/default.conf.template"
        - "README.md"

docs_to_consult_by_change:
  endpoints: ["docs/ai/30-contracts.yaml", "docs/ai/40-flows.yaml"]
  module_ownership: ["docs/ai/20-modules.yaml"]
  risky_change: ["docs/ai/50-guardrails.yaml", "docs/ai/60-debt.yaml"]
  product_decision: ["docs/ai/70-project-history.yaml"]
  deploy_or_env: ["docs/ai/10-system-map.yaml", "docs/ai/30-contracts.yaml"]

known_diagnostics:
  verified_in_repo:
    root:
      - ".\\diagnostico.bat"
      - ".\\diagnostico.ps1"
      - ".\\iniciar.bat"
      - ".\\detener.bat"
    ports_checked_by_scripts: [3000, 5174, 5175]
    manual_status:
      - "git status --short --branch"
      - "netstat -ano | Select-String ':3000|:5174|:5175'"
    health:
      - "GET http://localhost:3000/api/v1/health"

