    boundaries:
      - "Las imagenes se reciben como multipart field foto, se validan JPG/PNG/WebP <=5MB y se guardan como WebP en uploads/platos."
      - "Los archivos subidos se sirven por /uploads/platos y no se versionan en git."
      - "El campo `canal` (vianda/local/ambos) fue eliminado (2026-07-10, Fase 3 del replanteo de dominio). Se reemplaza por `disponible_vianda` (bool, gatea si el plato aparece en el circuito de vianda que gestiona este sistema) y la tabla `plato_disponibilidad_local` (calendario diario/dia_semana/fecha para el Local — venta por kilo, sin pedidos ni precio en este sistema, solo alimenta el futuro checklist de Cocina)."
      - "GET/PUT /api/v1/platos/:id/disponibilidad-local reemplaza toda la lista de entradas del plato (delete+insert), igual que visibilidad-empresas. Ver docs/ai/90-redesign-dominio-borrador.md."

