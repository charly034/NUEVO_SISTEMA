interface_limits:
  verified_in_repo:
    api_body_limit: "10kb"
    api_timeout_frontends_ms: 10000
    rate_limit_global: "1000 requests por IP cada 15 minutos en /api"
    rate_limit_login: "10 intentos por IP cada 15 minutos"
    rate_limit_registro_reset: "5 intentos por IP por hora"
    pedido_items_max: 7
    pedido_notas_max_chars: 300
    menu_nombre_max_chars: 150
    plato_nombre_max_chars: 150
    plato_descripcion_max_chars: 1000
    plato_descripcion_larga_max_chars: 4000
    plato_imagen_upload_max: "5 MB"
    plato_imagen_input_formats: ["image/jpeg", "image/png", "image/webp"]
    plato_imagen_storage_format: "image/webp comprimido, max 1200x900"
  from_chat_summary:
    opciones_por_dia_aproximadas: 15

production_readiness:
  verified_in_repo:
    api_healthcheck:
      endpoint: "GET /api/v1/health"
      dockerfile: "API_LA_QUINTA/Dockerfile"
      compose_dependency: "compose.yaml usa condition: service_healthy para admin/clientes"
    nginx_frontends:
      admin_template: "front_menu/nginx/default.conf.template"
      clientes_template: "front_clientes/nginx/default.conf.template"
      proxy_api: "location /api/ proxya a API_UPSTREAM"
      proxy_uploads: "location /uploads/ proxya a API_UPSTREAM para imagenes de platos"
      static_assets_cache: "location /assets/ usa expires 1y y Cache-Control public, immutable"
      index_cache: "location / usa Cache-Control no-cache"
    server_shutdown:
      status: "verified_in_repo"
      evidence:
        - "API_LA_QUINTA/src/server.js conserva la instancia server."
        - "API_LA_QUINTA/src/server.js maneja SIGTERM/SIGINT, cierra servidor HTTP y pool PostgreSQL."
    postgres_pool:
      status: "verified_in_repo"
      evidence:
        - "API_LA_QUINTA/src/database/connection.js crea new Pool(dbConfig)."
        - "API_LA_QUINTA/src/config/database.js configura max, idleTimeoutMillis y connectionTimeoutMillis."
        - "Variables env: DB_POOL_MAX, DB_IDLE_TIMEOUT_MS, DB_CONNECTION_TIMEOUT_MS."
    docker_static_validation:
      status: "verified_in_repo"
      evidence:
        - "compose.yaml define db, api, admin y clientes."
        - "compose.yaml define cloudflared como servicio opcional bajo profile tunnel; usa CLOUDFLARED_TUNNEL_TOKEN y depende de admin/clientes healthy."
        - "compose.yaml exige POSTGRES_PASSWORD y JWT_SECRET mediante expansion con error; CORS_ORIGINS tiene valor por defecto con localhost y dominios de laquinta."
        - "api depende de db healthy; admin/clientes dependen de api healthy."
        - "front_menu y front_clientes usan API_UPSTREAM=http://api:3000 en Docker."
        - "nginx templates proxyean /api/ a API_UPSTREAM y cachean /assets/ como immutable."
        - "Dockerfiles tienen HEALTHCHECK; API ejecuta migraciones antes de node src/server.js."
        - ".dockerignore por servicio excluye node_modules, dist, .env y logs."
    local_docker_runtime:
      status: "verified_in_local_runtime"
      evidence:
        - "Docker Desktop 4.78.0 esta instalado y el motor desktop-linux responde en WSL2."
        - "C:\\Program Files\\Docker\\Docker\\resources\\bin\\docker.exe --version: Docker version 29.5.3."
        - "docker compose version: Docker Compose version v5.1.4."
        - "Se creo .env local ignorado por git a partir de .env.docker.example, con secretos generados localmente y sin documentar valores reales."
        - "docker compose config OK."
        - "docker compose build OK para api, admin y clientes."
        - "docker compose build --no-cache admin clientes OK con npm ci --include=optional estricto."
        - "docker compose up -d OK; db, api, admin y clientes quedan healthy."
        - "GET http://localhost:3000/api/v1/health devuelve 200 con database.connected=true."
        - "GET http://localhost:5174 y http://localhost:5175 devuelven 200 desde Nginx."
        - "Smoke navegador integrado: admin y clientes cargan pantallas de login sin errores de consola ni overflow horizontal."

service_ports:
  verified_in_repo:
    api: 3000
    admin_dev: 5174
    clientes_dev: 5175
    frontend_container_port: 8080
    postgres_container: 5432
