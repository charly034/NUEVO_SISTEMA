  verified_in_repo:
    api_env_names:
      - "NODE_ENV"
      - "PORT"
      - "DB_HOST"
      - "DB_PORT"
      - "DB_NAME"
      - "DB_USER"
      - "DB_PASSWORD"
      - "DB_SSL"
      - "DB_POOL_MAX"
      - "DB_IDLE_TIMEOUT_MS"
      - "DB_CONNECTION_TIMEOUT_MS"
      - "DATABASE_URL"
      - "JWT_SECRET"
      - "JWT_EXPIRES_IN"
      - "JWT_EXPIRES_IN_SHORT"
      - "JWT_EXPIRES_IN_REMEMBER"
      - "APP_TIMEZONE"
      - "TRUST_PROXY_HOPS"
      - "CORS_ORIGINS"
      - "DEMO_ADMIN_EMAIL"
      - "DEMO_ADMIN_PASSWORD"
      - "DEMO_CLIENT_PASSWORD"
      - "TEST_DATA_PASSWORD"
      - "CLEAN_TEST_DATA_CONFIRM"
      - "SEED_FULL_RESET_CONFIRM"
      - "SUPERADMIN_EMAIL"
      - "SUPERADMIN_PASSWORD"
      - "DEFAULT_DEMO_PASSWORD"
      - "ADMIN_EMAIL"
      - "ADMIN_NEW_PASSWORD"
    root_docker_env_names:
      - "POSTGRES_DB"
      - "POSTGRES_USER"
      - "POSTGRES_PASSWORD"
      - "JWT_SECRET"
      - "JWT_EXPIRES_IN"
      - "DB_POOL_MAX"
      - "DB_IDLE_TIMEOUT_MS"
      - "DB_CONNECTION_TIMEOUT_MS"
      - "CORS_ORIGINS"
      - "APP_TIMEZONE"
