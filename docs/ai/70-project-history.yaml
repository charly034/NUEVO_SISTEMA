schema: la_quinta_project_history_v2
updated_at: "2026-07-02"

product_summary:
  from_chat_summary:
    - "La Quinta es una app web mobile-first para pedidos semanales."
    - "El diseno aprobado usa fondo calido, verde oliva, card semanal centrada y navegacion inferior Inicio / Historial / Perfil."
    - "El flujo actual a desarrollar es posterior a Hacer pedido o Modificar pedido."
    - "Cada dia puede tener hasta aproximadamente 15 opciones de plato."
    - "Algunos platos requieren elegir guarnicion y otros no."
    - "La empresa puede tener plan semanal lunes-domingo, dias sin servicio y reglas propias de modificacion."
    - "Si el plan es semanal, la modificacion vence el lunes de esa semana salvo regla especifica."
  verified_in_repo:
    - "Backend Express + PostgreSQL con prefijo /api/v1."
    - "front_clientes tiene rutas Inicio/Pedido semanal, Historial/Mis pedidos y Perfil/Mi cuenta."
    - "front_clientes usa BottomNavigation dentro de rutas privadas."
    - "API implementa empresas con modo_pedido, dias_laborales, limite_hora, limite_dia_semana y limite_anticipacion_dias."
    - "API implementa dias sin servicio en menus semanales."

confirmed_decisions:
  verified_in_repo:
    - "Monorepo con API_LA_QUINTA, front_menu y front_clientes."
    - "Autenticacion separada cliente/admin mediante JWT."
    - "Admin usa usuarios_admin; clientes usan empleados."
    - "Pedidos usan cabecera pedidos e items pedido_items."
    - "Un pedido por empleado y semana."
    - "La memoria tecnica para IA vive en docs/ai."
  from_chat_summary:
    - "Mantener nombres del dominio en espanol."
    - "Mantener UI cliente mobile-first."
    - "Un dia de menu marcado sin servicio/feriado debe quedar como sin vianda por defecto y bloqueado para edicion cliente/API."

current_project_state:
  verified_in_repo:
    implemented:
      - "API modular con rutas v1."
      - "Migraciones PostgreSQL hasta 1719000031000_pedido-items-sin-pedido.js."
      - "Auth cliente: login, me, registro, reset code, cambiar password, perfil."
      - "Auth admin: login, me, CRUD usuarios admin protegido por superadmin."
      - "CRUD admin para empresas, empleados, platos, guarniciones y menus semanales."
      - "Pedidos cliente: semanas, crear, modificar, confirmar, cancelar mi pedido, historial."
      - "Pedidos admin: listar, detalle, cambiar estado."
      - "Menu cliente por semana con fijos, especiales, guarniciones y sin servicio."
      - "Panel admin con dashboard, platos, semanas, historial, estadisticas, sugeridor, pedidos, empresas, guarniciones, administradores."
      - "App cliente con login, registro, recuperar, pedido semanal, historial y perfil."
      - "Docker Compose para db/api/admin/clientes."
      - "Docker Compose validado localmente con db/api/admin/clientes healthy y smoke HTTP/navegador OK."
      - "Tests backend de pedidos y tests frontend cliente."
    partially_implemented:
      - "Memoria docs/ai creada y ampliada; debe mantenerse en cambios futuros."
      - "Cache de opciones de menu sin politica de invalidacion completa."
      - "QA cliente documentada pero con nota desactualizada sobre tests."
      - "Funciones cliente legacy apuntan a endpoints no verificados."
    pending:
      - "Validar lint/build/test despues de cambios sin commit en front_clientes."
      - "Confirmar estrategia de carpeta contenedora de menu."
      - "Validar deploy real en staging/Easypanel con dominios y datos reales."
      - "Actualizar docs/pedidos-cliente.md si cambia contrato final."

conversation_decisions_or_context:
  from_chat_summary:
    - id: "menu_folder_container"
      text: "Los modulos de menu deben mantenerse dentro de una carpeta contenedora de menu."
      repo_status: "needs_user_confirmation"
      note: "El repo actual usa API_LA_QUINTA/src/modules/menu y API_LA_QUINTA/src/modules/menus-semanales separados."
    - id: "endpoint_menu_semanas"
      text: "Ya se agrego GET /api/v1/menu/semanas."
      repo_status: "needs_verification"
      note: "Ruta verificada: GET /api/v1/menu/semanas/:semanaId/opciones."

