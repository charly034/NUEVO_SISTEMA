      - "POST /api/v1/menus-semanales"
      - "POST /api/v1/menus-semanales/:id/duplicar"
      - "PUT /api/v1/menus-semanales/:id"
      - "DELETE /api/v1/menus-semanales/:id"
      - "PATCH /api/v1/menus-semanales/:id/estado"
      - "GET /api/v1/menus-semanales/:id/dias/:dia"
      - "POST /api/v1/menus-semanales/:id/dias"
