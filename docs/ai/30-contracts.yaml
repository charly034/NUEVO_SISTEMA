      - "POST /api/v1/notificaciones/admin/reglas"
      - "PATCH /api/v1/notificaciones/admin/reglas/:id"
      - "DELETE /api/v1/notificaciones/admin/reglas/:id"
      - "GET /api/v1/notificaciones/admin/whatsapp/config"
      - "GET /api/v1/notificaciones/admin/whatsapp/config/reveal"
      - "PATCH /api/v1/notificaciones/admin/whatsapp/config"
      - "GET /api/v1/notificaciones/admin/whatsapp/destinatarios"
      - "POST /api/v1/notificaciones/admin/whatsapp/destinatarios"
      - "PATCH /api/v1/notificaciones/admin/whatsapp/destinatarios/:id"
      - "DELETE /api/v1/notificaciones/admin/whatsapp/destinatarios/:id"
      - "GET /api/v1/notificaciones/admin/whatsapp/envios"
      - "GET /api/v1/notificaciones/admin/whatsapp/test-logs?limit=10"
      - "POST /api/v1/notificaciones/admin/whatsapp/probar"
      - "GET /api/v1/notificaciones"
      - "GET /api/v1/notificaciones/no-leidas/count"
      - "PATCH /api/v1/notificaciones/leer-todas"
      - "PATCH /api/v1/notificaciones/:id/leer"
    mis_sugerencias_removed_2026_07_09:
      - "Modulo sugerencias-empleados eliminado; rutas /api/v1/mis-sugerencias retiradas. Usar /api/v1/pedidos/sugerencias."
    users_legacy:
      - "ALL /api/v1/users -> 410 Gone"
      - "ALL /api/v1/users/:id -> 410 Gone"
  from_chat_summary:
    - "GET /api/v1/menu/semanas fue mencionado como agregado"
  needs_verification:
    - "No existe ruta exacta GET /api/v1/menu/semanas en el repo; existe GET /api/v1/menu/semanas/:semanaId/opciones."

payload_formats:
  verified_in_repo:
    pedido_create_or_update:
      accepted_fields:
        - "semana_inicio: YYYY-MM-DD"
        - "semanaId: alias legacy aceptado por normalizador"
        - "menu_semanal_id: integer opcional"
        - "menuSemanalId: alias legacy aceptado por normalizador"
        - "observaciones: string|null opcional"
        - "items: array"
        - "dias: array legacy normalizado a items"
      item_fields:
        - "dia: lunes|martes|miercoles|jueves|viernes|sabado|domingo"
        - "plato_id: integer positivo requerido si sin_pedido=false"
        - "opcion: letra A-Z para plato especial; null para fijo"
        - "guarnicion_id: integer|null"
        - "salsa_id: integer|null (2026-07-10, independiente de guarnicion_id; ver salsa_modo del plato)"
        - "sin_pedido: boolean"
        - "origen: usuario|default opcional si sin_pedido=true"
        - "notas: string <=300 opcional"
        - "estado: pendiente|entregado|cancelado expuesto en respuestas admin; no aceptado en create/update cliente. en_proceso/listo pueden existir como valores legacy de base."
        - "estado_updated_at: timestamptz|null expuesto en respuestas"
      invariants:
        - "items debe tener 1 a 7 dias"
        - "dias no pueden repetirse"
        - "sin_pedido=true exige plato_id null/undefined, guarnicion_id null/undefined y salsa_id null/undefined"
        - "guarnicion_id y salsa_id se validan de forma independiente segun guarnicion_modo/salsa_modo del plato (sin_X prohibe, fija ignora el valor enviado y usa el fijo del plato, libre lo exige y valida que este activo)"
        - "un plato con disponible_vianda=false no puede usarse en POST/PUT de pedidos (422), aunque siga activo=true; tampoco aparece como fijo/siempre en GET /pedidos/semanas"
        - "un pedido por empleado y semana: UNIQUE (empleado_id, semana_inicio)"
        - "pedido_items unico por pedido_id + dia"
        - "el plazo de POST/PUT se valida con la configuracion de empresa; menus_semanales.fecha_limite_pedidos no debe bloquear el pedido cliente"
        - "un dia marcado en menu_semanal_sin_servicio se muestra como sin_pedido por defecto, pero POST/PUT puede guardar plato para ese dia si pasa validacion de menu/plato/guarnicion y plazo"
        - "menu_semanal_sin_servicio cuenta por existencia de fila aunque motivo sea null; el cliente debe mostrarlo como Sin servicio"
        - "GET /api/v1/pedidos/semanas marca estado=cerrado cuando una empresa diaria/mixta ya tiene todos los dias laborales bloqueados por limiteEmpresa.diasCerrados"
        - "En PUT de un pedido existente, los items previos de dias ya vencidos se conservan aunque el frontend solo reenvie dias todavia editables; esos dias vencidos no pueden modificarse"
        - "POST/PUT guarda snapshot del plan vigente de la empresa en pedidos: plan_id, plan_codigo, plan_nombre, plan_gramaje_min/max, plan_incluye_postre y plan_incluye_bebida."
    pedido_estado_admin:
      endpoint: "PATCH /api/v1/pedidos/:id/estado"
      body: "{ estado: pendiente|en_proceso|completo|cancelado }"
      invariants:
        - "requiere Authorization Bearer admin"
        - "actualiza pedidos.estado; si estado=pendiente/cancelado sincroniza viandas activas a ese estado, y si estado=completo las sincroniza como entregadas."
        - "registra pedido_eventos tipo estado_cambiado, admin_auditoria accion=cambiar_estado y notificacion al empleado"
    pedido_item_estado_admin:
      endpoint: "PATCH /api/v1/pedidos/items/:itemId/estado"
      body: "{ estado: pendiente|entregado|cancelado }"
      response_data: "{ item, pedido }"
      storage:
        - "pedido_items.estado"
        - "pedido_items.estado_updated_at"
        - "pedidos.estado recalculado por agregacion de items activos"
      invariants:
        - "requiere Authorization Bearer admin"
        - "rechaza item inexistente, sin_pedido=true o pedido padre cancelado"
        - "pedido queda cancelado si no quedan viandas activas porque todas fueron canceladas o sin_pedido"
        - "pedido queda completo si todas sus viandas activas estan entregadas"
        - "pedido queda en_proceso si hay viandas entregadas o canceladas pero aun quedan viandas activas pendientes"
        - "pedido queda pendiente si todas las viandas activas estan pendientes"
        - "registra pedido_eventos tipo estado_item_cambiado y admin_auditoria accion=cambiar_estado_item"
        - "notifica al empleado solo si cambia el estado agregado del pedido"
    pedido_cancelar_cliente:
      endpoints:
        - "DELETE /api/v1/pedidos/mi-pedido?semana_inicio=YYYY-MM-DD"
        - "DELETE /api/v1/pedidos/:id/dias/:dia"
      invariants:
        - "requiere Authorization Bearer cliente"
        - "identifica el pedido por req.empleado.sub + semana_inicio o por :id validando empleado/empresa del token"
        - "cancela solo estados pendiente/en_proceso"
        - "DELETE /mi-pedido cancela completo solo si todos los dias activos estan dentro de plazo; si hay dias vencidos, conserva esos items y marca como sin_pedido solo los dias pendientes cancelables"
        - "DELETE /:id/dias/:dia marca ese item como sin_pedido si el dia todavia esta dentro del plazo de empresa; rechaza dias vencidos o ya sin_pedido"
        - "registra pedido_eventos tipo pedido_cancelado, pedido_cancelado_parcial o pedido_dia_cancelado segun corresponda"
        - "GET /api/v1/pedidos/mi-historial expone item.puede_cancelar y pedido.puede_cancelar para que la UI no ofrezca cancelar dias ya vencidos"
    pedido_sugerencia_cliente:
      endpoint: "POST /api/v1/pedidos/sugerencias"
      body: "{ semana_inicio: YYYY-MM-DD, ideas?: string[], comentario?: string }"
      invariants:
        - "requiere Authorization Bearer cliente"
        - "backend usa req.empleado.sub y req.empleado.empresa_id"
        - "front_clientes/src/components/pedido/SuggestionSheet.jsx y front_clientes/src/pages/SugerenciasPage.jsx usan este endpoint canonico para semanas sin menu"
        - "ideas maximo 12 items; cada item <=120 caracteres"
        - "comentario <=500 caracteres"
        - "debe llegar al menos una idea o comentario"
        - "un registro por empleado y semana: UNIQUE (empleado_id, semana_inicio)"
    pedido_sugerencia_opciones:
      endpoints:
        - "GET /api/v1/pedidos/sugerencias/opciones?semana_inicio=YYYY-MM-DD"
        - "PUT /api/v1/pedidos/sugerencias/opciones"
      body_put: "{ semana_inicio: YYYY-MM-DD lunes, plato_ids: integer[] }"
      storage: "pedido_sugerencia_opciones"
      invariants:
        - "semana_inicio debe ser lunes y representa la semana lunes-domingo."
        - "requiere Authorization Bearer admin para PUT."
        - "GET devuelve platos activos configurados para que el cliente los vea como chips sugeridos."
        - "PUT reemplaza la configuracion completa de esa semana, maximo 24 platos."
        - "front_menu/src/pages/RecomendacionesMenu.jsx administra esta seleccion desde el catalogo de platos."
        - "front_clientes/src/components/pedido/SuggestionSheet.jsx usa estas opciones; si no hay opciones configuradas, permite enviar solo comentario."
    menu_opciones_cliente:
      endpoints:
        - "GET /api/v1/pedidos/semanas"
        - "GET /api/v1/menu/semanas/:semanaId/opciones"
      response_option_fields:
        - "id"
        - "platoId"
        - "opcion"
        - "nombre"
        - "descripcion"
        - "categoria"
        - "tipo"
        - "requiereGuarnicion"
        - "destacado"
        - "grupo"
        - "estado"
        - "etiquetas"
        - "guarniciones"
        - "diasDisponibles solo para fijos cuando aplica"
        - "calorias opcional"
        - "alergenos array opcional"
        - "foto_url opcional"
        - "vegetariano boolean opcional"
        - "descripcionLarga opcional"
      note: "API_LA_QUINTA/src/modules/pedidos/pedidos.repository.js selecciona calorias/alergenos/foto_url/vegetariano/descripcion_larga de platos y pedidos.service.js los expone para lectura de menu cliente."
    auth_preferencias_cliente:
      endpoint: "PATCH /api/v1/auth/preferencias"
      body: "{ vegetariano?, sin_gluten?, sin_lacteos?, sin_pescado?, sin_frutos_secos?, recibir_recordatorios_whatsapp? }"
      response_data: "preferencias_alimentarias"
      storage: "empleados.preferencias_alimentarias JSONB"
      note: "recibir_recordatorios_whatsapp default false si falta; PATCH mergea campos enviados y preserva preferencias existentes. No controla las notificaciones internas de la app."
    auth_session_cliente:
      endpoints:
        - "POST /api/v1/auth/login"
        - "POST /api/v1/auth/registro"
        - "GET /api/v1/auth/me"
      response_data: "token? y empleado con id, nombre, apellido, email, telefono, fecha_nacimiento, preferencias_alimentarias, rol y empresa"
      note: "PerfilPage muestra telefono y cumpleanos desde el empleado de sesion; login/registro deben devolverlos igual que /auth/me."
    auth_registro_cliente:
      endpoint: "POST /api/v1/auth/registro"
      body: "{ codigo, nombre, apellido, email, telefono, fecha_nacimiento, password }"
      invariants:
        - "todos los campos son obligatorios"
        - "password minimo 8 caracteres"
        - "codigo debe corresponder a una empresa activa"
    empleado_create_update:
      endpoints:
        - "POST /api/v1/empleados"
        - "PATCH /api/v1/empleados/:id"
      body: "{ empresa_id?, nombre?, apellido?, email?, password?, activo?, rol?, telefono?, fecha_nacimiento? }"
      response_data: "id, nombre, apellido, email, activo, rol, empresa_id, telefono, fecha_nacimiento"
      note: "POST requiere empresa_id, nombre, apellido, email y password; front_menu/src/pages/Empresas.jsx expone telefono y fecha_nacimiento en ModalEmpleado."
    empleado_import_csv_admin:
      endpoint: "POST /api/v1/empleados/importar"
      body: "{ empresa_id, empleados: [{ nombre, apellido, email, password, telefono?, fecha_nacimiento?, rol? }] }"
      response_data: "{ creados: array, omitidos: array, errores: array }"
      invariants:
        - "requiere Authorization Bearer admin"
        - "maximo 300 filas por importacion"
        - "password minimo 8 caracteres"
        - "emails existentes se omiten y se devuelven en omitidos"
        - "registra admin_auditoria accion=importar_csv si la tabla existe"
    notificaciones_cliente:
      endpoints:
        - "GET /api/v1/notificaciones"
        - "GET /api/v1/notificaciones/no-leidas/count"
        - "PATCH /api/v1/notificaciones/:id/leer"
        - "PATCH /api/v1/notificaciones/leer-todas"
      invariants:
        - "requiere Authorization Bearer cliente"
        - "todas las consultas filtran por req.empleado.id"
        - "tipos validos: menu, recordatorio, confirmado, sistema"
        - "la creacion de notificaciones internas no depende de recibir_recordatorios_whatsapp; esa preferencia es solo para futuros avisos por WhatsApp/telefono"
        - "front_clientes/src/pages/PedidoPage.jsx usa GET /notificaciones/no-leidas/count para el badge real del header Inicio."
        - "front_clientes/src/pages/NotificacionesPage.jsx invalida notificaciones y notificaciones-no-leidas al marcar leidas."
    notificaciones_admin:
      endpoints:
        - "GET /api/v1/notificaciones/admin"
        - "POST /api/v1/notificaciones/admin"
      body_post: "{ alcance: todos|empresa|empleado, tipo?: menu|recordatorio|confirmado|sistema, titulo: string<=120, cuerpo: string<=700, empresa_id?: integer, empleado_id?: integer }"
      response_post_data: "{ enviadas: number, destinatarios: number }"
      invariants:
        - "requiere Authorization Bearer admin"
        - "alcance=empresa exige empresa_id; alcance=empleado exige empleado_id"
        - "solo crea notificaciones para empleados activos de empresas activas con rol distinto de admin"
        - "front_menu/src/pages/NotificacionesAdmin.jsx consume estos endpoints via front_menu/src/hooks/useNotificaciones.js en el panel Internas"
    notificaciones_reglas:
      endpoints:
        - "GET /api/v1/notificaciones/admin/reglas"
        - "POST /api/v1/notificaciones/admin/reglas"
        - "PATCH /api/v1/notificaciones/admin/reglas/:id"
        - "DELETE /api/v1/notificaciones/admin/reglas/:id"
      body_create_update: "{ canal: interna|whatsapp, evento: nuevo_registro|menu_publicado|pedido_estado_cambiado|pedido_semanal_pendiente, nombre: string<=160, activo: boolean, titulo: string<=160, cuerpo: string<=900, filtros: object, programacion?: object }"
      filtros:
        alcance: "todos|empresa|empleado|empleado_evento|destinatarios_whatsapp"
        optional_fields: ["empresa_id", "empleado_id", "rol", "plan", "modo_pedido", "dias_laborales", "solo_preferencia_whatsapp", "requiere_telefono", "destinatario_whatsapp_ids"]
      programacion:
        applies_to: "evento=pedido_semanal_pendiente"
        shape: "{ tipo: semanal, dia_semana: 0..6 donde 0=domingo y 1=lunes, hora: HH:mm }"
      storage: "notificacion_reglas"
      invariants:
        - "requiere Authorization Bearer admin"
        - "canal=interna no acepta alcance=destinatarios_whatsapp"
        - "alcance=empresa exige empresa_id; alcance=empleado exige empleado_id"
        - "empleado_evento usa el empleado asociado al evento, por ejemplo el pedido o el nuevo registro"
        - "templates aceptan variables simples con sintaxis {{variable}}"
        - "pedido_semanal_pendiente es ejecutado por scheduler interno de API y filtra solo empleados sin pedido no-cancelado para la semana publicada objetivo"
    notificaciones_whatsapp_n8n:
      endpoints:
        - "GET /api/v1/notificaciones/admin/whatsapp/config"
        - "GET /api/v1/notificaciones/admin/whatsapp/config/reveal"
        - "PATCH /api/v1/notificaciones/admin/whatsapp/config"
        - "GET /api/v1/notificaciones/admin/whatsapp/destinatarios"
        - "POST /api/v1/notificaciones/admin/whatsapp/destinatarios"
        - "PATCH /api/v1/notificaciones/admin/whatsapp/destinatarios/:id"
        - "DELETE /api/v1/notificaciones/admin/whatsapp/destinatarios/:id"
        - "GET /api/v1/notificaciones/admin/whatsapp/envios"
        - "GET /api/v1/notificaciones/admin/whatsapp/test-logs?limit=10"
        - "POST /api/v1/notificaciones/admin/whatsapp/probar"
      config_get_response_data: "{ activo: boolean, configured: boolean, masked_webhook_url: string fijo; no devuelve webhook_url real }"
      config_reveal_response_data: "{ webhook_url: string real; requiere admin y registra admin_auditoria accion=revelar_webhook_whatsapp }"
      config_body: "{ activo: boolean, webhook_url?: string https; si ya existe webhook, PATCH puede omitir URL para preservar la guardada }"
      destinatario_body: "{ nombre: string<=160, telefono: string<=40, email?: string<=255, empresa_id?: integer, activo?: boolean }"
      webhook_payload: "{ canal: whatsapp, evento, regla: { id, nombre }, destinatario, mensaje: { titulo, cuerpo }, contexto }"
      prueba_response:
        ok_201: "{ success: true, data: { enviado: true, envio_id, estado, status_code, respuesta, error } }"
        webhook_error: "{ success: false, errorCode: N8N_HTTP_ERROR|N8N_NETWORK_ERROR|N8N_TIMEOUT|INVALID_WEBHOOK_URL|VALIDATION_ERROR, message, data: { enviado: false, envio_id?, estado?, status_code?, respuesta?, error?, errorCode } }"
      test_logs_response_data: "array con id, created_at, destinatario, telefono, nombre, mensaje, status_code, success, response_body, error_code, requested_by"
      storage:
        - "notificacion_configuracion clave whatsapp_n8n"
        - "notificacion_destinatarios_whatsapp"
        - "notificacion_envios_whatsapp"
        - "whatsapp_test_logs"
        - "admin_auditoria para reveal de webhook"
      invariants:
        - "requiere Authorization Bearer admin"
        - "el webhook_url se guarda en DB para administrarlo desde front_menu; no documentar valores reales y no devolverlo en GET config"
        - "GET config/reveal es el unico endpoint que devuelve webhook_url real; registra auditoria admin sin guardar el secreto en metadata"
        - "webhook_url debe ser https; se rechaza http en backend"
        - "POST probar valida telefono E.164 con libphonenumber-js, mensaje no vacio y <=900 caracteres; sanitiza mensaje antes de reenviar a n8n"
        - "POST probar registra cada intento en whatsapp_test_logs con requested_by"
        - "si WhatsApp esta inactivo o no tiene webhook_url, los eventos no llaman a n8n"
        - "cada intento de webhook registra estado pendiente/enviado/fallido, status_code, respuesta o error"
    notificaciones_eventos_automaticos:
      storage:
        - "notificaciones.dedupe_key opcional con indice unico parcial"
        - "notificacion_reglas define canal, evento, filtros y templates"
        - "notificacion_ejecuciones_programadas registra dedupe de reglas programadas por regla_id + run_key"
      triggers:
        - "API_LA_QUINTA/src/modules/auth/auth.service.js dispara nuevo_registro despues de crear empleado."
        - "API_LA_QUINTA/src/modules/menus-semanales/menus-semanales.service.js dispara menu_publicado al pasar un menu a publicado."
        - "API_LA_QUINTA/src/modules/pedidos/pedidos.service.js dispara pedido_estado_cambiado cuando admin cambia estado de pedido."
        - "API_LA_QUINTA/src/modules/notificaciones/notificaciones.scheduler.js dispara pedido_semanal_pendiente segun programacion semanal por regla."
      dedupe:
        - "menu-publicado:<menu_id>:<empleado_id>"
        - "pedido-estado:<pedido_id>:<estado>"
        - "nuevo-registro:<empleado_id>"
        - "pedido-semanal-pendiente:<semana_inicio>:<run_key>:regla:<regla_id>:<empleado_id>"
      fallback:
        - "Si notificacion_reglas todavia no existe, el service conserva comportamiento interno legacy para no romper bases parcialmente migradas."
    mis_sugerencias_cliente_removed:
      endpoint: "eliminado 2026-07-09 (era POST /api/v1/mis-sugerencias)"
      storage: "sugerencias_empleados (tabla sin consumidores; drop opcional a futuro)"
      note: "Modulo sugerencias-empleados eliminado. El unico flujo de sugerencias es POST /api/v1/pedidos/sugerencias."
    pedido_sugerencias_admin:
      endpoint: "GET /api/v1/pedidos/sugerencias"
      query: "{ semana_inicio?: YYYY-MM-DD, empresa_id?: integer, limit?: integer, offset?: integer }"
      response_data: "array de sugerencias con empleado, empresa, semana_inicio, ideas, comentario, created_at y updated_at"
      invariants:
        - "requiere Authorization Bearer admin"
        - "debe declararse antes de GET /api/v1/pedidos/:id para no colisionar con parametro id"
    menu_semanal_create:
      body: "{ nombre, fecha_inicio: YYYY-MM-DD, fecha_fin: YYYY-MM-DD }"
    menu_semanal_duplicar:
      endpoint: "POST /api/v1/menus-semanales/:id/duplicar"
      body: "{ nombre, fecha_inicio: YYYY-MM-DD, fecha_fin: YYYY-MM-DD }"
      response_data: "menu nuevo en estado borrador"
      invariants:
        - "requiere Authorization Bearer admin"
        - "falla con 409 si ya existe menu para fecha_inicio destino"
        - "copia menu_semanal_dias y menu_semanal_sin_servicio desde el menu origen"
        - "registra historial_uso_platos para las opciones copiadas y admin_auditoria accion=duplicar si la tabla existe"
    menu_dia_add:
      body: "{ dia, opcion?: A-Z default A, plato_id }"
    menu_sin_servicio:
      body: "{ dia, motivo?: string <=200 }"
      invariant: "motivo es opcional; una fila con motivo=null sigue representando dia sin servicio"
      client_behavior: "front_clientes muestra el dia como sin vianda por defecto y no lo permite editar ni enviar como item editable."
      pedidos_behavior: "POST/PUT /api/v1/pedidos rechaza items enviados para ese dia con 422."
    menu_estado:
      endpoint: "PATCH /api/v1/menus-semanales/:id/estado"
      body: "{ estado: borrador|publicado|cerrado, fecha_limite_pedidos?: timestamptz|null }"
      note: "front_menu envia fecha_limite_pedidos=null al reabrir para limpiar limites vencidos; el pedido cliente usa el plazo de empresa."
    plato_create:
      content_types: ["application/json", "multipart/form-data"]
      body: "{ nombre, descripcion?, descripcion_larga?, tags?, tipo?: fijo|especial|ambos, tiene_guarnicion?: boolean, vegetariano?: boolean, calorias?: integer|null, alergenos?: string[], foto_url?: string|null }"
      multipart_file: "foto: JPG|PNG|WebP <=5MB; API convierte y comprime a /uploads/platos/<slug>-<timestamp>.webp"
      response_data: "id, nombre, descripcion, descripcion_larga, tags, tipo, tiene_guarnicion, vegetariano, calorias, alergenos, foto_url, activo, created_at, updated_at"
    plato_update:
      content_types: ["application/json", "multipart/form-data"]
      body: "mismos campos opcionales que plato_create + activo?"
      invariants:
        - "calorias debe ser null o >=0"
        - "foto_url local debe apuntar a /uploads/platos/*.webp si no es URL absoluta http/https"
        - "si se envia foto nueva, reemplaza foto_url y se intenta borrar el archivo local anterior"
    empresa_create:
      body: "{ nombre, slug, plan_id?, plan?, modo_pedido?, dias_laborales?, limite_hora?, limite_dia_semana?, limite_anticipacion_dias?, email?, telefono? }"
      list_response: "{ data: array, total: number, page: number, pageSize: number } dentro de response.data; excluye empresas con deleted_at no null"
      dependencias_response: "{ puedeEliminarse: boolean, pedidosActivos: number, saldoCuentaCorriente: number }"
      enums:
        plan: ["basico", "con_postre", "con_postre_bebida"]
        modo_pedido: ["semanal", "diario", "ambos"]
        dias_laborales: ["lunes_viernes", "lunes_sabado", "lunes_domingo"]
      note: "plan legacy se conserva; plan_id referencia planes_vianda y la respuesta incluye plan_detalle. DELETE marca activo=false y deleted_at=NOW(); si hay pedidos estado pendiente/en_proceso/listo o saldo distinto de cero responde 409 con detalle."
    planes_vianda:
      endpoint: "GET/POST/PATCH/DELETE /api/v1/planes"
      body_create_update: "{ codigo?, nombre, descripcion?, gramaje_min, gramaje_max?, incluye_postre, incluye_bebida, activo?, orden? }"
      storage: "planes_vianda"
      defaults:
        - "Plan Clasico 450"
        - "Plan Clasico 450 + Postre"
        - "Plan Clasico 450 + Bebida"
        - "Plan Clasico 450 Completo"
        - "Plan Abundante 600"
        - "Plan Abundante 600 + Postre"
        - "Plan Abundante 600 + Bebida"
        - "Plan Abundante 600 Completo"
      invariants:
        - "requiere Authorization Bearer admin"
        - "gramaje_min debe ser positivo"
        - "gramaje_max null o mayor/igual a gramaje_min"
        - "DELETE no borra fisicamente; marca activo=false"
    estadisticas_admin:
      endpoints:
        - "GET /api/v1/estadisticas/platos-mas-usados?desde=&hasta=&empresa_id="
        - "GET /api/v1/estadisticas/distribucion-tags?desde=&hasta=&empresa_id="
        - "GET /api/v1/estadisticas/uso-por-dia?desde=&hasta=&empresa_id="
        - "GET /api/v1/estadisticas/tendencia-mensual?desde=&hasta=&empresa_id="
      note: "Sin empresa_id usa historial_uso_platos global; con empresa_id usa pedidos/pedido_items no cancelados para metricas por cliente."
    admin_auditoria:
      endpoint: "GET /api/v1/admin/auditoria"
      query: "{ page?: integer, limit?: integer<=200, entidad_tipo?: string, accion?: string, admin_id?: integer }"
      storage: "admin_auditoria"
      response_data: "{ eventos: array, pagination: object }"
      note: "Registra acciones admin nivel 2 para menus, pedidos y empleados; el logger no rompe operaciones si la tabla aun no fue migrada."
    finanzas:
      endpoints:
        - "GET /api/v1/finanzas/mi-historial"
        - "GET /api/v1/finanzas/resumen"
        - "GET /api/v1/finanzas/pedidos-pagos"
        - "GET /api/v1/finanzas/cuenta-corriente/empresas/:empresaId"
        - "GET /api/v1/finanzas/cuenta-corriente/empleados/:empleadoId"
        - "POST/PATCH/POST anular/POST aplicar/DELETE aplicacion sobre /api/v1/finanzas/pagos"
        - "POST /api/v1/finanzas/ajustes"
      frontend_consumers:
        - "front_clientes/src/services/api.js"
        - "front_clientes/src/pages/HistorialPage.jsx"
        - "front_menu/src/hooks/useFinanzas.js"
        - "front_menu/src/pages/PedidosPagos.jsx"
        - "front_menu/src/pages/Empresas.jsx"
        - "front_menu/src/components/finanzas/CuentaCorrienteFicha.jsx"
      auth: "mutaciones y consultas admin requieren Authorization Bearer admin via requireAdminAuth; GET /mi-historial requiere Authorization Bearer cliente via requireAuth"
      storage:
        - "pedidos.estado_financiero, pedidos.importe_total, pedidos.importe_pagado, pedidos.moneda"
        - "pedido_items.precio_unitario, pedido_items.precio_moneda"
        - "finanzas_pagos"
        - "finanzas_pago_aplicaciones"
        - "finanzas_configuracion_cobro"
        - "finanzas_ajustes"
      pago_body: "{ pagador_tipo: empresa|empleado, empresa_id?, empleado_id?, monto, fecha_pago: YYYY-MM-DD, metodo_pago, periodo_desde?, periodo_hasta?, observacion?, comprobante_url?, numero_recibo? }"
      pago_update_body: "mismos campos opcionales que pago_body; solo permite editar pagos activos"
      pago_anular_body: "{ motivo?: string }"
      pago_aplicar_body: "{ aplicaciones?: [{ pedido_id, pedido_item_id?, monto_aplicado }] }"
      ajuste_body: "{ empresa_id? xor empleado_id?, monto positivo o negativo distinto de 0, motivo, referencia? }"
      cuenta_corriente_response: "{ tipo, id, pedidos: array con estado/estado_financiero/importes/cantidad_viandas/items/plan snapshot, pagos: array con monto_aplicado y aplicaciones[{ id, pedido_id, pedido_item_id, monto_aplicado, semana_inicio, pedido_estado, estado_financiero, empleado_nombre, empleado_apellido, empresa_nombre }], ajustes: array }"
      mi_historial_cliente_response: "{ tipo, id, alcance: empleado|empresa, puede_ver_empresa, pedidos: array con estado/estado_financiero/importes/items/pagado_por_empresa/pagado_por_empleado, pagos: array activo sanitizado con aplicaciones, ajustes: array sanitizado, configuracion_cobro?, totales }"
      invariants:
        - "Un pago activo puede cubrir varios pedidos mediante finanzas_pago_aplicaciones."
        - "GET /finanzas/mi-historial filtra por req.empleado y no acepta empresa_id/empleado_id por query como autoridad."
        - "En GET /finanzas/mi-historial, un empleado con rol cliente ve solo pedidos, pagos propios y deuda propia; puede ver si un pedido fue cubierto por empresa sin listar pagos de empresa."
        - "En GET /finanzas/mi-historial, un empleado con rol admin ve pedidos de su empresa y pagos de empresa, sin usar tokens de panel admin."
        - "Si POST /pagos/:id/aplicar no recibe aplicaciones, intenta aplicar automaticamente a pedidos mas viejos con saldo pendiente del mismo pagador."
        - "Las aplicaciones manuales no pueden superar el saldo disponible del pago."
        - "Al crear/eliminar aplicaciones o anular pagos se recalcula pedidos.estado_financiero con pendiente/parcial/pagado/saldo_a_favor."
        - "Los pagos no se borran fisicamente; se anulan con estado=anulado."
        - "DELETE /pagos/:id/aplicaciones/:aplicacionId desasocia una aplicacion y registra admin_auditoria."
        - "Los cambios financieros registran admin_auditoria si existe la tabla."
        - "Pedido cancelado no se cobra en resumen/cuenta corriente salvo ajuste financiero manual."

