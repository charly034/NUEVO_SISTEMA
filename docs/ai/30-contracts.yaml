schema: la_quinta_contracts_v2
updated_at: "2026-06-27"

api_base:
  verified_in_repo: "/api/v1"

response_contract:
  verified_in_repo:
    success_helper:
      file: "API_LA_QUINTA/src/utils/response.js"
      shape:
        success: true
        message: "string"
        data: "any"
    created_helper:
      status: 201
      shape: "igual a success_helper"
    no_content_helper:
      status: 204
      body: null
    error_helper:
      shape:
        success: false
        message: "string"
        errors: "array"
    exceptions:
      - endpoint_area: "estadisticas"
        shape: "{ data }"
        files: ["API_LA_QUINTA/src/modules/estadisticas/estadisticas.controller.js"]
      - endpoint_area: "sugerencias"
        shape: "{ data }"
        files: ["API_LA_QUINTA/src/modules/sugerencias/sugerencias.controller.js"]
      - endpoint_area: "auth/admin auth manual bad requests"
        shape: "{ success: false, message }"

auth_contracts:
  verified_in_repo:
    cliente:
      header: "Authorization: Bearer <token>"
      token_payload_has: ["sub", "empresa_id", "nombre", "apellido", "rol"]
      middleware: "requireAuth"
      request_owner: "front_clientes/src/services/api.js"
      storage_keys: ["token", "empleado"]
    admin:
      header: "Authorization: Bearer <token>"
      token_payload_has: ["sub", "tipo=admin", "nombre", "apellido", "rol"]
      middleware: "requireAdminAuth"
      request_owner: "front_menu/src/lib/apiClient.js"
      storage_keys: ["admin_token", "admin_user"]

endpoints:
  verified_in_repo:
    health:
      - "GET /api/v1/health"
    auth_cliente:
      - "POST /api/v1/auth/login"
      - "GET /api/v1/auth/me"
      - "GET /api/v1/auth/verificar-codigo/:codigo"
      - "POST /api/v1/auth/registro"
      - "POST /api/v1/auth/usar-reset-code"
      - "POST /api/v1/auth/cambiar-password"
      - "PATCH /api/v1/auth/perfil"
    auth_admin:
      - "POST /api/v1/admin/auth/login"
      - "GET /api/v1/admin/auth/me"
      - "GET /api/v1/admin/auth/usuarios"
      - "POST /api/v1/admin/auth/usuarios"
      - "PATCH /api/v1/admin/auth/usuarios/:id"
      - "DELETE /api/v1/admin/auth/usuarios/:id"
    pedidos:
      - "GET /api/v1/pedidos/menu-hoy"
      - "GET /api/v1/pedidos/menu-semana?fecha_inicio=YYYY-MM-DD"
      - "GET /api/v1/pedidos/menu-activo"
      - "GET /api/v1/pedidos/menu/semanas/:semanaId/opciones"
      - "GET /api/v1/pedidos/semanas"
      - "GET /api/v1/pedidos/mi-pedido?semana_inicio=YYYY-MM-DD"
      - "POST /api/v1/pedidos"
      - "PUT /api/v1/pedidos/:id"
      - "PATCH /api/v1/pedidos/:id/confirmar"
      - "POST /api/v1/pedidos/sugerencias"
      - "GET /api/v1/pedidos/sugerencias"
      - "DELETE /api/v1/pedidos/mi-pedido?semana_inicio=YYYY-MM-DD"
      - "GET /api/v1/pedidos/mi-historial"
      - "GET /api/v1/pedidos"
