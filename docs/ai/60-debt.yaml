      - "Comandos npm de seeds consolidados: seed, seed:catalogo, seed:menus, seed:demo, seed:demo-reset, seed:admin y seed:demo-profiles."
      - "seed:test-data crea datos QA no destructivos, asegura menus de test para semanas objetivo y desactiva empleados sobrantes en las empresas objetivo para conservar 4/4/4/13 empleados activos sin borrar historial."
      - "seed-admin.js crea usuarios del panel en usuarios_admin, no empleados, y preserva rol superadmin para usuarios existentes."
      - "seed-test-data.js exige TEST_DATA_PASSWORD por env, usa tipos vigentes especial/ambos, completa datos de perfil de empleados y guarda snapshot de planes_vianda en pedidos."
      - "limpiar-datos-prueba.js agrega dry-run y apply para remover empresas/empleados/pedidos/menus seed de prueba conocidos; apply exige CLEAN_TEST_DATA_CONFIRM=ELIMINAR_DATOS_PRUEBA y bloquea NODE_ENV=production."
      - "API_LA_QUINTA/.env.example y .env.example usan placeholders para passwords demo/dev."
    risk: "Riesgo residual medio: seed-full-reset sigue siendo destructivo si se confirma explicitamente en dev/test."
    recommended_cut: "No ejecutar seed-full-reset en produccion; usar solo seed-admin con credenciales provistas por env si hace falta."

