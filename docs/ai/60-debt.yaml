technical_debt:
  - id: "debt-notificaciones-filtro-plan-legacy"
    status: resolved
    area: "notificaciones"
    evidence:
      - "2026-07-09: el filtro de reglas de notificacion migro de empresas.plan legacy a plan_id."
      - "notificaciones.repository.js findDestinatarios/findEmpleadosSinPedidoSemanal seleccionan emp.plan_id."
      - "notificaciones.service.js filtrarEmpleadosPorParametros compara por plan_id; normalizarFiltros guarda plan_id."
      - "front_menu NotificacionesAdmin.jsx usa selector dinamico de planes por plan_id (usePlanes) en lugar de opciones legacy hardcodeadas."
      - "Corrige el bug introducido al dropear emp.plan: empleado.plan quedaba undefined y excluia a todos los destinatarios en reglas filtradas por plan."
    risk: "Bajo. Reglas legacy en BD con filtros.plan de texto degradan seguro: dejan de filtrar por plan (llegan a todo el alcance) hasta re-guardarlas."
    recommended_cut: "Completado. Re-guardar desde el panel cualquier regla legacy con filtros.plan para migrarla a plan_id."

