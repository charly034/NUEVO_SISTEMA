  - id: "debt-api-test-flakiness-paralelo"
    status: resolved
    area: "API_LA_QUINTA.test"
    evidence:
      - "2026-07-17: al reconstruir la DB de test y sumar un test file nuevo (admin-auditoria-cobertura) se hizo evidente que varios tests de consistencia sobre estado GLOBAL fallan de forma no-determinista bajo ejecucion paralela (node --test corre los test FILES en paralelo)."
      - "Races observados: categorias-fase-f iteraba todos los menus no-sembrados y daba 404 cuando otro test borraba uno a mitad de iteracion; vista-semanal asertaba activas===total sobre el conteo GLOBAL de empresas activas (no atomico frente a inserts concurrentes de otros files); categorias-fase-c (createMenuSemanal siembra fijos) tambien aparecia esporadicamente."
      - "Confirmado que NO son bugs de codigo: la suite da 154/154 verde de forma determinista en modo secuencial (node --test --test-concurrency=1). El baseline previo de 152/152 pasaba por suerte de timing."
      - "Fix: (a) package.json 'test' pasa a 'node --test --test-concurrency=1' (determinista, ~21s, suite chica); (b) endurecimientos puntuales: vista-semanal crea su propia empresa activa y ya no exige la igualdad global racy; categorias-fase-f saltea menus borrados concurrentemente (404) en vez de romper."
      - "Verificado: 3 corridas seguidas de npm test dieron 154/154."
    risk: "Bajo. Se pierde el paralelismo del runner (la suite tarda ~21s en vez de ~12s), a cambio de determinismo total."
    recommended_cut: "Completado. Si en el futuro se quiere volver a paralelo, habria que aislar los tests de consistencia global (scoping a datos propios/sembrados con prefijo consistente) en vez de asertar sobre todas las filas."

